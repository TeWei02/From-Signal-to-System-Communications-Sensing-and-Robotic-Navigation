# office_map.yaml
# Metadata file for the 2-D occupancy grid map of the office environment.
# Used by ROS2 map_server and the occupancy grid mapper.
#
image: office_map.pgm          # path to the PGM image (relative to this file)
resolution: 0.05               # metres per pixel
origin: [-10.0, -8.0, 0.0]    # [x, y, yaw] of the lower-left pixel in the world frame
negate: 0                      # 0 = white pixels are free, black are occupied
occupied_thresh: 0.65          # log-odds threshold for "occupied"
free_thresh: 0.196             # log-odds threshold for "free"
mode: trinary                  # occupancy mode: trinary | scale | raw
